<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #43e97b, #38f9d7);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .signup-container {
            background: white;
            padding: 30px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        .signup-container h1 {
            margin-bottom: 20px;
        }

        /* Django form styling */
        .signup-container p {
            text-align: left;
            margin-bottom: 10px;
        }

        .signup-container input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
            outline: none;
        }

        .signup-container input:focus {
            border-color: #43e97b;
        }

        .signup-container button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: #43e97b;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        .signup-container button:hover {
            background: #2ed573;
        }

        .login-link {
            display: block;
            margin-top: 15px;
            text-decoration: none;
            color: #43e97b;
        }
    </style>

</head>
<body>

<div class="signup-container">
    <h1>Signup</h1>

    <form method="POST">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">Signup</button>
    </form>

    <a href="{% url 'login' %}" class="login-link">
        Already have account? Login
    </a>
</div>

</body>
</html>
